<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coordinator — Evaluations by Month</title>

  <!-- Tailwind for UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    body { background-color: #f8fafc; }
    /* dropdown styles */
    .nav-dropdown { display: none; position: absolute; right: 0; top: 100%; background: white; border-radius: 6px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); width: 220px; z-index: 60; overflow: hidden; }
    .nav-dropdown.open { display: block; }
    .nav-dropdown a { display: block; padding: 0.6rem 1rem; text-decoration: none; color: #0f172a; }
    .nav-dropdown a:hover { background: #f1f5f9; }
    .header-actions { position: relative; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-slate-900">

  <!-- Top header injection point -->
  <div id="topHeader"></div>

  <!-- Page content -->
  <main class="max-w-6xl mx-auto p-4">
    <!-- Header row (keeps small dynamic field / month controls) -->
    <section id="pageHeader" class="mt-4">
      <div class="bg-white shadow p-4 rounded">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
          <div>
            <div id="welcome" class="text-lg font-semibold">Coordinator Dashboard</div>
            <div id="dynamicFieldLine" class="text-sm text-slate-600">Dynamic field: <span id="dynamicFieldBadge" class="font-medium">—</span></div>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-sm text-slate-600 mr-2">Month:</div>
            <button id="prevMonthBtn" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">Previous</button>
            <div id="monthDisplay" class="px-3 py-1 font-semibold"></div>
            <button id="nextMonthBtn" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">Next</button>
            <!-- logout fallback -->
            <button id="logoutBtnFallback" class="ml-4 px-3 py-1 bg-red-600 text-white rounded hidden">Logout</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Stats -->
    <section class="mt-6">
      <div id="statsRow" class="flex gap-4 flex-wrap"></div>
    </section>

    <!-- Table -->
    <section class="mt-6">
      <div class="overflow-x-auto bg-white rounded shadow">
        <table class="w-full table-auto text-sm" id="evalTable">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2 text-left">Assignment #</th>
              <th class="p-2 text-left">Student</th>
              <th class="p-2 text-left">Student Code</th>
              <th class="p-2 text-left">Firm</th>
              <th class="p-2 text-left">Evaluator</th>
              <th class="p-2 text-left">Overall</th>
              <th class="p-2 text-left">Comments</th>
              <th class="p-2 text-left">Quality Work</th>
              <th class="p-2 text-left">Responsibility</th>
              <th class="p-2 text-left">Theoretical Knowledge</th>
              <th class="p-2 text-left">Practical Skills</th>
              <th class="p-2 text-left">Motivation</th>
              <th class="p-2 text-left">Communication</th>
              <th class="p-2 text-left">Human Relations</th>
              <th class="p-2 text-left">Punctuality</th>
              <th class="p-2 text-left">Initiative</th>
              <th class="p-2 text-left">Report Writing</th>
              <th class="p-2 text-left">Submitted At</th>
            </tr>
          </thead>
          <tbody id="dashboardTable" class="divide-y"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal for evaluation details -->
  <div id="modal" class="fixed inset-0 hidden bg-black/40 z-50 items-center justify-center">
    <div class="bg-white rounded p-6 w-full max-w-3xl max-h-[80vh] overflow-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modalTitle" class="text-lg font-semibold">Evaluation</h3>
        <button id="modalClose" class="text-2xl">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- JS module -->
  <script type="module" src="evaluations-dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { if (window.feather) feather.replace(); });
  </script>
</body>
</html>
