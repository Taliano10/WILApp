<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>
    
    <form id="resetForm" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
        <input type="email" id="email" required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border" 
               placeholder="Enter your email" />
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700">
        Send Reset Link
      </button>
    </form>

    <p id="message" class="mt-4 text-center text-sm"></p>

    <div class="mt-6 text-center">
      <a href="logIn.html" class="text-indigo-600 hover:underline">Back to Login</a>
    </div>
  </div>

  <!-- Link to external JS -->
  <script type="module" src="reset-password.js"></script>
</body>
</html>
