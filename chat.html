<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecturer Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/index.css" />
</head>

<body class="bg-gray-100 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold">Chat with <span id="chatPartnerName">User</span></h1>
        <a id="backBtn" href="#" class="text-sm underline hover:text-gray-200">⬅ Back</a>
    </header>

    <!-- Chat Display Area -->
    <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-50">
        <!-- Messages will appear here -->
    </main>

    <!-- Message Input -->
    <footer class="p-4 bg-white border-t flex gap-2 items-center">
        <input id="messageInput" type="text" class="flex-1 border rounded px-4 py-2 focus:outline-none focus:ring"
            placeholder="Type your message..." />
        <button id="sendBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Send</button>
    </footer>

    <!-- External JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script type="module" src="../auth.js"></script>
    <script type="module" src="chat.js"></script>
</body>

</html>
