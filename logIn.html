<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - WIL Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <!-- Navbar -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">WIL Platform</h1>
      <nav class="space-x-6 text-sm">
        <a href="template.html" class="hover:text-blue-600">Home</a>
      </nav>
    </div>
  </header>

  <!-- Login Form Section -->
  <section class="py-20 bg-blue-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-md w-full max-w-md p-8">
      <h2 class="text-2xl font-bold text-blue-700 text-center mb-6">Login to Your Account</h2>
      <form class="space-y-5" onsubmit="return false;">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">User Code</label>
          <input type="text" id="user-code" required
            class="w-full px-4 py-2 border rounded-md focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" required
            class="w-full px-4 py-2 border rounded-md focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" required
            class="w-full px-4 py-2 border rounded-md focus:ring-blue-500" />
        </div>
        <button id="loginButton"
          class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
          Login
        </button>
        <div class="text-center mt-4">
          <a href="reset-password.html" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
          <p class="mt-4 text-sm text-gray-700">
            Don't have an account?
            <a href="signUp.html" class="text-blue-600 hover:underline">Sign up</a>
          </p>
        </div>
      </form>

      <!-- Error Modal -->
      <div id="errorModal" class="fixed inset-0 hidden bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 shadow-md w-full max-w-sm text-center">
          <h2 class="text-lg font-bold text-red-600 mb-2">Login Failed</h2>
          <p id="errorMessage" class="text-sm text-gray-700"></p>
          <button id="closeModal"
            class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
            Close
          </button>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="logIn.js"></script>
</body>
</html>
